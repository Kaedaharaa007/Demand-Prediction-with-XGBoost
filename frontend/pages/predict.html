<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Predict Demand</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <h1 style="color: rgb(32, 4, 244);">StockSense</h1>
    <p style=" color: rgb(141, 139, 139);">Inventory intelligence for retail demanding forecast</p>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="predict.html" class="nav-active">Predict</a>
      <a href="results.html">Results</a>
      <a href="about.html">About</a>
    </nav>
    <hr>  
  <header>
  
    <section id="predict">
      <form id="form">
        <label for="">Store</label>
        <select name="" id="store">
          <option value="" disabled selected hidden>Select a store</option>
          <option value="0">S001</option>
          <option value="1">S002</option>
          <option value="2">S003</option>
          <option value="3">S004</option>
          <option value="4">S005</option>
        </select>

        <label for="">Product</label>
        <select name="" id="product">
          <option value="" disabled selected hidden>Select a product</option>
          <option value="0">P0001</option>
          <option value="1">P0002</option>
          <option value="2">P0003</option>
          <option value="3">P0004</option>
          <option value="4">P0005</option>
          <option value="5">P0006</option>
          <option value="6">P0007</option>
          <option value="7">P0008</option>
          <option value="8">P0009</option>
          <option value="9">P0010</option>
          <option value="10">P0011</option>
          <option value="11">P0012</option>
          <option value="12">P0013</option>
          <option value="13">P0014</option>
          <option value="14">P0015</option>
          <option value="15">P0016</option>
          <option value="16">P0017</option>
          <option value="17">P0018</option>
          <option value="18">P0019</option>
          <option value="19">P0020</option>
        </select>

        <label for="">Category</label>
        <select id="category">
          <option value="" selected hidden disabled>Select a category product</option>
          <option value="3">Groceries</option>
          <option value="4">Toys</option>
          <option value="1">Electronics</option>
          <option value="2">Furniture</option>
          <option value="0">Clothing</option>
        </select>

        <label for="">Price</label>
        <input type="number" id="price">

        <label for="">Competitor pricing</label>
        <input type="number" id="competitor_pricing">

        <label for="">Inventory level</label>
        <input type="number" id="inventory">

        <label for="">Units ordered</label>
        <input type="number" id="units_ordered">

        <label for="">Discount in percentage (%)</label>
        <input type="number" id="disc">

        <label for="">Demand forecast</label>
        <input type="number" id="demand_forecast">

        <label for="">Weather</label>
        <select name="" id="weather">
          <option value=""disabled hidden selected>Select a weather</option>
          <option value="3">Sunny</option>
          <option value="0">Cloudy</option>
          <option value="1">Rainy</option>
          <option value="2">Snowy</option>
        </select>

        <label for="">Region</label>
        <select name="" id="region">
          <option value=""disabled hidden selected>Select a Region</option>
          <option value="1">North</option>
          <option value="2">South</option>
          <option value="3">West</option>
          <option value="0">East</option>
        </select>

        <label for="">Seasonality</label>
        <select name="" id="seasonality">
          <option value=""disabled hidden selected>Select a seasonality</option>
          <option value="0">Autumn</option>
          <option value="2">Summer</option>
          <option value="3">Winter</option>
          <option value="1">Spring</option>
        </select>

        <label for="">Holiday or Promotion</label>
        <div id="holiday_or_promotion-wrapper">
          <label class="radio-label">
            <input type="radio" name="holiday_or_promotion" value="1">Yes
          </label>
          <label class="radio-label">
            <input type="radio" name="holiday_or_promotion" value="0">No
          </label>
        </div>

        <div class="mid-wrapper">
          <button type="submit" class="submit-btn" onclick="submitInput()">Predict Demand Forecast</button>
        </div>
      </form>
      <div id="predict-result">
        <h1>Prediction Results</h1>
        <div class="container">
          <p id="result_prediction">!results go here!</p>
        </div>
      </div>
    </section>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../script.js"></script>
</body>
</html>
